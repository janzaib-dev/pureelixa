<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Multi-stage Gold Gradient for metallic depth -->
    <linearGradient id="gold-smooth" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#BF953F;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#FCF6BA;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#B38728;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#FBF5B7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#AA771C;stop-opacity:1" />
    </linearGradient>
    
    <filter id="premium-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.6" />
      <feOffset dx="0.4" dy="0.4" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#premium-glow)">
    <!-- Interlocked PE with traditional high-end serif -->
    <text x="50%" y="62" 
          text-anchor="middle" 
          font-family="Georgia, 'Times New Roman', serif" 
          font-size="54" 
          font-weight="bold" 
          fill="url(#gold-smooth)" 
          letter-spacing="-1.5">PE</text>
    
    <!-- Single Smooth Metallic Swoosh -->
    <path d="M15 65 Q 40 55, 60 59 T 90 65" 
          fill="none" 
          stroke="url(#gold-smooth)" 
          stroke-width="3.5" 
          stroke-linecap="round" />
  </g>
</svg>
